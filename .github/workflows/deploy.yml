name: Build & Deploy → one.com

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/deploy.yml']
  repository_dispatch:
    types: [storyblok-publish]   # von einem Storyblok-Webhook ausgelöst (siehe DEPLOY.md)
  workflow_dispatch: {}           # manueller Start per Knopfdruck in GitHub

concurrency:
  group: deploy-onecom
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Dependencies
        run: npm ci

      - name: Build (Astro, statisch, Inhalte aus Storyblok = publiziert)
        run: npm run build
        env:
          STORYBLOK_TOKEN: ${{ secrets.STORYBLOK_TOKEN }}   # Space-Preview-Token (lesend)
          STORYBLOK_REGION: eu

      - name: Upload nach one.com (SFTP via lftp)
        env:
          HOST: ${{ secrets.ONECOM_SFTP_HOST }}     # ssh.creative-studios.tv
          USER: ${{ secrets.ONECOM_SFTP_USER }}     # creative-studios.tv
          PASS: ${{ secrets.ONECOM_SFTP_PASSWORD }} # SSH/SFTP-Passwort (NICHT das FTP-Passwort!)
          REMOTE: "."   # Webroot = SFTP-Login-Verzeichnis (per Marker-Test bestätigt)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # User + Passwort URL-encodieren -> robust gegen Sonderzeichen im Passwort
          ENC_USER=$(printf '%s' "$USER" | python3 -c "import sys,urllib.parse;print(urllib.parse.quote(sys.stdin.read(),safe=''))")
          ENC_PASS=$(printf '%s' "$PASS" | python3 -c "import sys,urllib.parse;print(urllib.parse.quote(sys.stdin.read(),safe=''))")
          echo "::add-mask::$ENC_PASS"   # encodiertes PW in den Logs maskieren
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 2; set net:timeout 20;
            open sftp://$ENC_USER:$ENC_PASS@$HOST;
            mirror -R --no-perms --parallel=4 ./dist '$REMOTE';
          "

      - name: Live-Check (Deploy verifizieren)
        run: |
          sleep 6   # kurz auf Auslieferung/Cache warten
          ok=1
          for path in "/" "/en/" "/wissen/" "/studio/led-studio-mieten/" "/xr-studio/virtual-production/" "/wissen/kosten-drehtag/"; do
            code=000
            for try in 1 2 3 4 5; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://creative-studios.tv$path?ci=$GITHUB_RUN_ID")
              [ "$code" = "200" ] && break
              sleep 6
            done
            echo "  $path -> HTTP $code"
            [ "$code" = "200" ] || ok=0
          done
          [ "$ok" = "1" ] || { echo "::error::Mindestens eine Seite ist nach mehreren Versuchen nicht HTTP 200"; exit 1; }
          echo "✓ Alle Seiten live (HTTP 200)"
